version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=sqlite3:///app/storage/development.sqlite3
    depends_on:
      - db
    command: bundle exec rails server -b 0.0.0.0

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=rails
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=rails_cookbook_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  bundle_cache:
  postgres_data:
